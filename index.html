<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dark Stairs | Catálogo</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main>
    <section class="home" id="home" aria-label="Página principal">
      <div class="home__overlay"></div>
      <div class="home__actions">
        <div class="home__buttons">
          <button class="home__cta" id="openCatalogBtn" type="button">Ver catálogo</button>
        </div>
      </div>

      <a
        class="home__whatsapp"
        href="https://api.whatsapp.com/send/?phone=5535998443067"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Abrir conversa no WhatsApp"
      >
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.669.15-.198.297-.768.967-.941 1.164-.173.198-.347.223-.644.075-.297-.149-1.255-.463-2.39-1.475-.883-.788-1.479-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.496.099-.198.05-.372-.025-.521-.074-.149-.669-1.611-.916-2.206-.242-.579-.487-.5-.669-.51l-.57-.01c-.198 0-.52.074-.793.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.214 3.074.149.198 2.099 3.2 5.083 4.487.711.307 1.266.49 1.699.628.714.227 1.363.195 1.877.118.572-.085 1.758-.719 2.006-1.413.248-.695.248-1.29.173-1.413-.074-.124-.272-.198-.57-.347z" />
          <path d="M20.52 3.48A11.905 11.905 0 0 0 12.03 0C5.406 0 .03 5.376.03 12c0 2.115.552 4.182 1.602 6.006L0 24l6.17-1.617A11.95 11.95 0 0 0 12.03 24C18.654 24 24.03 18.624 24.03 12c0-3.205-1.247-6.216-3.51-8.52zm-8.49 18.51a9.94 9.94 0 0 1-5.071-1.388l-.364-.216-3.661.958.978-3.57-.237-.367a9.95 9.95 0 0 1-1.545-5.287c0-5.514 4.487-10 10-10 2.67 0 5.179 1.04 7.069 2.931 1.889 1.89 2.931 4.398 2.931 7.069 0 5.513-4.486 10-10 10z" />
        </svg>
      </a>
    </section>

    <section class="catalog" id="catalog" aria-label="Catálogo em apresentação">
      <div class="catalog__stage">
        <button class="catalog__back" id="backBtn" type="button" aria-label="Voltar para a página principal">
          Voltar
        </button>

        <button class="catalog__arrow catalog__arrow--left" id="prevBtn" type="button" aria-label="Imagem anterior">
          &#10094;
        </button>

        <figure class="catalog__figure">
          <img id="slideImage" src="" alt="Imagem do catálogo" />
        </figure>

        <canvas class="catalog__particles" id="catalogParticles" aria-hidden="true"></canvas>

        <button class="catalog__arrow catalog__arrow--right" id="nextBtn" type="button" aria-label="Próxima imagem">
          &#10095;
        </button>
      </div>
      <p class="catalog__counter" id="counter"></p>
    </section>
  </main>

  <script src="./script.js"></script>
</body>
</html>
