<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dark Stairs | Catálogo</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main>
    <section class="home" id="home" aria-label="Página principal">
      <div class="home__overlay"></div>
      <div class="home__actions">
        <button class="home__cta" id="openCatalogBtn" type="button">Ver catálogo</button>
      </div>
    </section>

    <section class="catalog" id="catalog" aria-label="Catálogo em apresentação">
      <div class="catalog__stage">
        <button class="catalog__back" id="backBtn" type="button" aria-label="Voltar para a página principal">
          Voltar
        </button>

        <button class="catalog__arrow catalog__arrow--left" id="prevBtn" type="button" aria-label="Imagem anterior">
          &#10094;
        </button>

        <figure class="catalog__figure">
          <img id="slideImage" src="" alt="Imagem do catálogo" />
        </figure>

        <canvas class="catalog__particles" id="catalogParticles" aria-hidden="true"></canvas>

        <button class="catalog__arrow catalog__arrow--right" id="nextBtn" type="button" aria-label="Próxima imagem">
          &#10095;
        </button>
      </div>
      <p class="catalog__counter" id="counter"></p>
    </section>
  </main>

  <script src="./script.js"></script>
</body>
</html>
